<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyBook</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f10;
      --surface: #1a1a1d;
      --surface2: #222226;
      --border: #2e2e34;
      --accent: #c8a96e;
      --accent2: #8b6fd4;
      --text: #e8e8ec;
      --text2: #9090a0;
      --text3: #60606e;
      --tag-bg: #2a2a30;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 56px 1fr;
      grid-template-areas: "sidebar header" "sidebar main";
      min-height: 100vh;
    }

    /* Header */
    .header {
      grid-area: header;
      display: flex;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .search-wrap {
      flex: 1;
      max-width: 480px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text3);
      font-size: 14px;
      pointer-events: none;
    }

    #search {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 36px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text3); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .btn-add {
      background: var(--accent);
      color: #1a1206;
      border: none;
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: opacity 0.15s;
    }

    .btn-add:hover { opacity: 0.85; }

    /* Sidebar */
    .sidebar {
      grid-area: sidebar;
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 16px 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .logo {
      padding: 8px 20px 20px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      color: var(--text);
    }

    .logo span { color: var(--accent); }

    .sidebar-section {
      padding: 4px 12px 8px;
    }

    .sidebar-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 0 8px;
      margin-bottom: 4px;
    }

    .cat-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      color: var(--text2);
      padding: 7px 8px;
      border-radius: 7px;
      cursor: pointer;
      text-align: left;
      font-size: 13.5px;
      transition: background 0.15s, color 0.15s;
    }

    .cat-btn:hover { background: var(--surface2); color: var(--text); }
    .cat-btn.active { background: rgba(200, 169, 110, 0.12); color: var(--accent); }

    .cat-btn .cat-icon { font-size: 15px; width: 20px; text-align: center; }

    .cat-btn .cat-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      background: var(--surface2);
      padding: 1px 6px;
      border-radius: 10px;
    }

    .sidebar-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 12px;
    }

    /* Main */
    .main {
      grid-area: main;
      padding: 24px;
      overflow-y: auto;
    }

    .page-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    .count-bar {
      color: var(--text3);
      font-size: 12px;
      margin-bottom: 16px;
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      position: relative;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .card-cat {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 6px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text);
    }

    .card-body {
      font-size: 13px;
      color: var(--text2);
      line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 12px;
    }

    .tag {
      background: var(--tag-bg);
      color: var(--text3);
      border-radius: 5px;
      padding: 2px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.15s, background 0.15s;
    }

    .tag:hover { color: var(--accent); }

    .card-pin {
      position: absolute;
      top: 14px;
      right: 14px;
      font-size: 13px;
      opacity: 0.4;
    }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 680px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 28px;
      position: relative;
    }

    .modal-cat {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text3);
      margin-bottom: 8px;
    }

    .modal-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 18px;
      color: var(--text);
      line-height: 1.3;
    }

    .modal-content {
      color: var(--text2);
      line-height: 1.7;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .modal-content a { color: var(--accent); text-decoration: none; }
    .modal-content a:hover { text-decoration: underline; }

    .modal-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 18px;
      background: var(--surface2);
      border: none;
      color: var(--text2);
      width: 30px;
      height: 30px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--border); }

    /* Add form modal */
    .form-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%;
      max-width: 600px;
      padding: 28px;
      position: relative;
    }

    .form-title {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .form-group { margin-bottom: 14px; }

    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text3);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-textarea { min-height: 120px; resize: vertical; }

    .form-select option { background: var(--surface2); }

    .form-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: flex-end;
    }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 8px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }

    .btn-save {
      background: var(--accent);
      color: #1a1206;
      border: none;
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Category color dots */
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      display: inline-block;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .layout {
        grid-template-columns: 1fr;
        grid-template-areas: "header" "main";
      }
      .sidebar { display: none; }
      .cards { grid-template-columns: 1fr; }
    }

    /* Empty state */
    .empty {
      text-align: center;
      color: var(--text3);
      padding: 80px 20px;
    }

    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-text { font-size: 15px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text3); }
  </style>
</head>
<body>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo">My<span>Book</span></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Навигация</div>
      <button class="cat-btn active" data-cat="all" onclick="filterCat('all', this)">
        <span class="cat-icon">◈</span> Все записи
        <span class="cat-count" id="count-all">0</span>
      </button>
      <button class="cat-btn" data-cat="pinned" onclick="filterCat('pinned', this)">
        <span class="cat-icon">📌</span> Закреплённые
        <span class="cat-count" id="count-pinned">0</span>
      </button>
    </div>

    <div class="sidebar-divider"></div>

    <div class="sidebar-section">
      <div class="sidebar-label">Категории</div>
      <div id="cat-list"></div>
    </div>
  </aside>

  <!-- Header -->
  <header class="header">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input id="search" type="text" placeholder="Поиск по заметкам..." oninput="applyFilters()" />
    </div>
    <div class="header-right">
      <button class="btn-add" onclick="openAddModal()">＋ Добавить</button>
    </div>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="page-title" id="page-title">Все записи</div>
    <div class="count-bar" id="count-bar"></div>
    <div class="cards" id="cards-grid"></div>
    <div class="empty" id="empty-state" style="display:none">
      <div class="empty-icon">🔍</div>
      <div class="empty-text">Ничего не найдено</div>
    </div>
  </main>
</div>

<!-- Read Modal -->
<div class="modal-overlay" id="read-modal" onclick="closeReadModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeReadModalDirect()">✕</button>
    <div class="modal-cat" id="m-cat"></div>
    <div class="modal-title" id="m-title"></div>
    <div class="modal-content" id="m-content"></div>
    <div class="modal-tags" id="m-tags"></div>
  </div>
</div>

<!-- Add Modal -->
<div class="modal-overlay" id="add-modal" onclick="closeAddModal(event)">
  <div class="form-modal">
    <button class="modal-close" onclick="closeAddModalDirect()">✕</button>
    <div class="form-title">Новая запись</div>

    <div class="form-group">
      <label class="form-label">Заголовок</label>
      <input class="form-input" id="f-title" type="text" placeholder="Название записи..." />
    </div>

    <div class="form-group">
      <label class="form-label">Категория</label>
      <select class="form-select" id="f-cat">
        <!-- filled by JS -->
      </select>
    </div>

    <div class="form-group">
      <label class="form-label">Содержимое</label>
      <textarea class="form-textarea" id="f-content" placeholder="Текст, ссылки, заметки..."></textarea>
    </div>

    <div class="form-group">
      <label class="form-label">Теги (через запятую)</label>
      <input class="form-input" id="f-tags" type="text" placeholder="дизайн, клиент, важное..." />
    </div>

    <div class="form-group" style="display:flex;align-items:center;gap:8px;margin-top:4px">
      <input type="checkbox" id="f-pin" style="width:16px;height:16px;cursor:pointer" />
      <label for="f-pin" style="font-size:13px;color:var(--text2);cursor:pointer">Закрепить</label>
    </div>

    <div class="form-actions">
      <button class="btn-cancel" onclick="closeAddModalDirect()">Отмена</button>
      <button class="btn-save" onclick="saveNote()">Сохранить</button>
    </div>
  </div>
</div>

<script>
// ─── CATEGORIES ──────────────────────────────────────────────
const CATEGORIES = [
  { id: 'work',      label: 'Работа',          icon: '💼', color: '#c8a96e' },
  { id: 'clients',   label: 'Клиенты',         icon: '🤝', color: '#8b6fd4' },
  { id: 'templates', label: 'Шаблоны',         icon: '📄', color: '#4a9eca' },
  { id: 'ideas',     label: 'Идеи',            icon: '💡', color: '#e07b50' },
  { id: 'learn',     label: 'Учёба / Инфо',   icon: '📚', color: '#5ab87a' },
  { id: 'links',     label: 'Ссылки',          icon: '🔗', color: '#e05577' },
  { id: 'notes',     label: 'Заметки',         icon: '🗒️', color: '#9090a0' },
  { id: 'misc',      label: 'Разное',          icon: '🗃️', color: '#60606e' },
];

// ─── DATA (edit here to add notes) ──────────────────────────
// To add a note: copy one object, fill fields, add to the array.
// id: unique number | title: string | cat: category id
// content: text (supports links as plain URLs)
// tags: array of strings | pin: true/false
let NOTES = [
  {
    id: 1,
    title: 'Добро пожаловать в MyBook!',
    cat: 'notes',
    pin: true,
    tags: ['старт'],
    content: `Это твоя личная база знаний.

Как пользоваться:
• Нажми "＋ Добавить" — создать новую запись
• Кликни на карточку — читать полный текст
• Поиск вверху — ищет по заголовку, тексту и тегам
• Слева — фильтр по категориям
• Теги на карточках — кликабельны (фильтр по тегу)

Как добавить запись в код (вручную):
Найди в файле массив NOTES и добавь новый объект по образцу.`,
  },
  {
    id: 2,
    title: 'Шаблон ответа клиенту',
    cat: 'templates',
    pin: false,
    tags: ['клиент', 'шаблон', 'текст'],
    content: `Привет! Спасибо за обращение 🙏

Я ознакомилась с твоей идеей. Чтобы рассчитать стоимость и время, мне нужно уточнить:

1. Размер и место на теле
2. Цвет или чёрно-белая?
3. Примеры референсов (если есть)
4. Примерная дата, когда хочешь записаться

Жду ответа, чтобы всё посчитать ✨`,
  },
  {
    id: 3,
    title: 'Цветовые коды для сайта',
    cat: 'work',
    pin: false,
    tags: ['дизайн', 'цвета', 'css'],
    content: `Основная палитра сайта:

Фон:        #0f0f10
Поверхность: #1a1a1d
Акцент:     #c8a96e  (золото)
Текст:      #e8e8ec
Текст 2:    #9090a0

Шрифт: -apple-system, Segoe UI, sans-serif`,
  },
  {
    id: 4,
    title: 'Идея: коллаб с фотографом',
    cat: 'ideas',
    pin: false,
    tags: ['идея', 'коллаб'],
    content: `Сделать совместную съёмку с фотографом — готовые тату + атмосферные кадры.

Можно продвигать оба аккаунта.
Договориться на взаимовыгодной основе (бесплатно для обоих).

Надо найти фотографа в теме dark/minimal.`,
  },
];

// ─── STATE ───────────────────────────────────────────────────
let activeCat = 'all';
let activeTag  = null;
let searchQ    = '';

const STORAGE_KEY = 'mybook_notes';

function persistNotes() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(NOTES));
}

function loadNotes() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) NOTES = JSON.parse(saved);
    else persistNotes(); // seed localStorage with defaults
  } catch(e) {
    persistNotes();
  }
}

// ─── INIT ─────────────────────────────────────────────────────
function init() {
  loadNotes();
  renderCatList();
  applyFilters();
  fillCatSelect();
}

function renderCatList() {
  const el = document.getElementById('cat-list');
  el.innerHTML = CATEGORIES.map(c => `
    <button class="cat-btn" data-cat="${c.id}" onclick="filterCat('${c.id}', this)">
      <span class="cat-icon">${c.icon}</span> ${c.label}
      <span class="cat-count" id="count-${c.id}">0</span>
    </button>
  `).join('');
  updateCounts();
}

function updateCounts() {
  const allN = NOTES.length;
  document.getElementById('count-all').textContent = allN;
  document.getElementById('count-pinned').textContent = NOTES.filter(n => n.pin).length;
  CATEGORIES.forEach(c => {
    const el = document.getElementById('count-' + c.id);
    if (el) el.textContent = NOTES.filter(n => n.cat === c.id).length;
  });
}

function fillCatSelect() {
  const sel = document.getElementById('f-cat');
  sel.innerHTML = CATEGORIES.map(c =>
    `<option value="${c.id}">${c.icon} ${c.label}</option>`
  ).join('');
}

// ─── FILTER ──────────────────────────────────────────────────
function filterCat(cat, btn) {
  activeCat = cat;
  activeTag = null;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const cat_obj = CATEGORIES.find(c => c.id === cat);
  document.getElementById('page-title').textContent =
    cat === 'all'    ? 'Все записи' :
    cat === 'pinned' ? '📌 Закреплённые' :
    (cat_obj ? cat_obj.icon + ' ' + cat_obj.label : 'Все записи');

  applyFilters();
}

function filterByTag(tag) {
  activeTag = tag;
  activeCat = 'all';
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  document.querySelector('[data-cat="all"]').classList.add('active');
  document.getElementById('page-title').textContent = '🏷 #' + tag;
  applyFilters();
}

function applyFilters() {
  searchQ = document.getElementById('search').value.toLowerCase();

  let result = NOTES.slice();

  if (activeCat === 'pinned') result = result.filter(n => n.pin);
  else if (activeCat !== 'all') result = result.filter(n => n.cat === activeCat);

  if (activeTag) result = result.filter(n => n.tags && n.tags.includes(activeTag));

  if (searchQ) result = result.filter(n =>
    n.title.toLowerCase().includes(searchQ) ||
    n.content.toLowerCase().includes(searchQ) ||
    (n.tags && n.tags.some(t => t.toLowerCase().includes(searchQ)))
  );

  // pinned first
  result.sort((a, b) => (b.pin ? 1 : 0) - (a.pin ? 1 : 0));

  renderCards(result);
}

// ─── RENDER ──────────────────────────────────────────────────
function renderCards(notes) {
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');
  const bar = document.getElementById('count-bar');

  bar.textContent = notes.length
    ? `${notes.length} ${plural(notes.length, 'запись', 'записи', 'записей')}`
    : '';

  if (!notes.length) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = notes.map(n => {
    const cat = CATEGORIES.find(c => c.id === n.cat);
    const tags = (n.tags || []).map(t =>
      `<span class="tag" onclick="event.stopPropagation();filterByTag('${t}')">#${t}</span>`
    ).join('');
    return `
      <div class="card" onclick="openNote(${n.id})">
        ${n.pin ? '<span class="card-pin">📌</span>' : ''}
        <div class="card-cat" style="color:${cat ? cat.color : 'var(--text3)'}">${cat ? cat.icon + ' ' + cat.label : ''}</div>
        <div class="card-title">${esc(n.title)}</div>
        <div class="card-body">${esc(n.content)}</div>
        ${tags ? `<div class="card-tags">${tags}</div>` : ''}
      </div>
    `;
  }).join('');
}

// ─── READ MODAL ───────────────────────────────────────────────
function openNote(id) {
  const n = NOTES.find(n => n.id === id);
  if (!n) return;
  const cat = CATEGORIES.find(c => c.id === n.cat);
  document.getElementById('m-cat').textContent = cat ? cat.icon + ' ' + cat.label : '';
  document.getElementById('m-cat').style.color = cat ? cat.color : 'var(--text3)';
  document.getElementById('m-title').textContent = n.title;
  document.getElementById('m-content').innerHTML = linkify(esc(n.content));
  document.getElementById('m-tags').innerHTML = (n.tags || [])
    .map(t => `<span class="tag" onclick="filterByTag('${t}');closeReadModalDirect()">#${t}</span>`)
    .join('');
  document.getElementById('read-modal').classList.add('open');
}

function closeReadModal(e) {
  if (e.target === document.getElementById('read-modal')) closeReadModalDirect();
}
function closeReadModalDirect() {
  document.getElementById('read-modal').classList.remove('open');
}

// ─── ADD MODAL ────────────────────────────────────────────────
function openAddModal() {
  document.getElementById('f-title').value = '';
  document.getElementById('f-content').value = '';
  document.getElementById('f-tags').value = '';
  document.getElementById('f-pin').checked = false;
  document.getElementById('add-modal').classList.add('open');
}

function closeAddModal(e) {
  if (e.target === document.getElementById('add-modal')) closeAddModalDirect();
}
function closeAddModalDirect() {
  document.getElementById('add-modal').classList.remove('open');
}

function saveNote() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }

  const maxId = NOTES.reduce((m, n) => Math.max(m, n.id), 0);
  const tags = document.getElementById('f-tags').value
    .split(',').map(t => t.trim()).filter(Boolean);

  const note = {
    id: maxId + 1,
    title,
    cat: document.getElementById('f-cat').value,
    pin: document.getElementById('f-pin').checked,
    tags,
    content: document.getElementById('f-content').value,
  };

  NOTES.unshift(note);
  persistNotes();
  updateCounts();
  applyFilters();
  closeAddModalDirect();
  showToast('✅ Сохранено');
}

function showToast(text) {
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:24px;right:24px;background:#1a1a1d;border:1px solid var(--border);
    color:var(--text);padding:12px 18px;border-radius:10px;font-size:13px;z-index:999;
    box-shadow:0 4px 20px rgba(0,0,0,0.4);transition:opacity 0.3s`;
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 300); }, 2500);
}

// ─── UTILS ────────────────────────────────────────────────────
function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function linkify(s) {
  return s.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>');
}

function plural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

// ─── KEYBOARD ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeReadModalDirect(); closeAddModalDirect(); }
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// ─── START ────────────────────────────────────────────────────
init();
</script>
