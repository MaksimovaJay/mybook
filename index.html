<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MyBook</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d0d0f;
      --s1:       #141417;
      --s2:       #1c1c21;
      --s3:       #242429;
      --border:   #2a2a32;
      --border2:  #35353f;
      --text:     #eeeef2;
      --text2:    #8e8ea0;
      --text3:    #55556a;
      --accent:   #c9a96e;
      --radius:   12px;
    }

    /* Cat colours */
    --c-work:      #c9a96e;
    --c-clients:   #9b7fe8;
    --c-templates: #5eaee0;
    --c-ideas:     #e07b50;
    --c-learn:     #5bbf7a;
    --c-links:     #e05577;
    --c-notes:     #8e8ea0;
    --c-misc:      #55556a;

    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100%;
    }

    /* ── Layout ─────────────────────────────────── */
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ────────────────────────────────── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--s1);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .logo {
      padding: 22px 18px 18px;
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .sb-section { padding: 0 8px 8px; }
    .sb-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text3);
      padding: 10px 8px 4px;
    }

    .sb-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      background: none;
      border: none;
      color: var(--text2);
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .sb-btn:hover  { background: var(--s2); color: var(--text); }
    .sb-btn.active { background: rgba(201,169,110,.13); color: var(--accent); }
    .sb-btn .icon  { width: 18px; text-align: center; font-size: 14px; flex-shrink: 0; }
    .sb-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text3);
      background: var(--s3);
      padding: 1px 7px;
      border-radius: 20px;
      min-width: 22px;
      text-align: center;
    }

    .sb-divider { height: 1px; background: var(--border); margin: 6px 8px; }

    .sb-bottom {
      margin-top: auto;
      padding: 12px 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Main area ──────────────────────────────── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    .topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 20;
    }

    .search-wrap { flex: 1; max-width: 420px; position: relative; }
    .search-wrap svg {
      position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
      opacity: .4; pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--s2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 34px;
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .2s;
    }
    #search:focus { border-color: var(--accent); }
    #search::placeholder { color: var(--text3); }

    .topbar-actions { margin-left: auto; display: flex; gap: 8px; align-items: center; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      border: none; border-radius: 8px; cursor: pointer;
      font-size: 13px; font-weight: 500; padding: 8px 14px;
      transition: opacity .15s, background .15s;
    }
    .btn-primary { background: var(--accent); color: #1a1206; font-weight: 700; }
    .btn-primary:hover { opacity: .88; }
    .btn-ghost {
      background: var(--s2); color: var(--text2);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--s3); color: var(--text); }

    .content { padding: 24px; flex: 1; }

    .page-head {
      display: flex; align-items: baseline; gap: 10px;
      margin-bottom: 18px;
    }
    .page-title { font-size: 19px; font-weight: 700; }
    .page-count { font-size: 13px; color: var(--text3); }

    /* ── Cards ──────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--s1);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      cursor: pointer;
      transition: border-color .2s, transform .15s, box-shadow .2s;
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 8px;
      border-left: 3px solid transparent;
    }
    .card:hover {
      border-color: var(--border2);
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,.35);
    }

    .card-top { display: flex; align-items: center; gap: 6px; }
    .card-cat-label {
      font-size: 10px; font-weight: 700;
      letter-spacing: .08em; text-transform: uppercase;
    }
    .card-pin { margin-left: auto; font-size: 12px; opacity: .5; }
    .card-date { font-size: 11px; color: var(--text3); margin-left: auto; }

    .card-title { font-size: 14px; font-weight: 600; line-height: 1.4; }

    .card-body {
      font-size: 12.5px; color: var(--text2); line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
      flex: 1;
    }

    .card-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 2px; }
    .tag {
      font-size: 11px; color: var(--text3);
      background: var(--s3); border-radius: 5px;
      padding: 2px 7px; cursor: pointer;
      transition: color .15s, background .15s;
    }
    .tag:hover { color: var(--accent); background: var(--s2); }

    .card-actions {
      display: flex; gap: 4px; margin-top: 4px;
      opacity: 0; transition: opacity .15s;
    }
    .card:hover .card-actions { opacity: 1; }

    .card-btn {
      background: var(--s3); border: none; border-radius: 6px;
      color: var(--text3); font-size: 12px; padding: 4px 9px;
      cursor: pointer; transition: color .15s, background .15s;
    }
    .card-btn:hover { background: var(--border2); color: var(--text); }
    .card-btn.del:hover { color: #e05577; }

    /* ── Empty ──────────────────────────────────── */
    .empty {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 80px 20px; color: var(--text3); text-align: center; gap: 10px;
    }
    .empty-icon { font-size: 38px; }
    .empty-text { font-size: 15px; }
    .empty-sub { font-size: 13px; color: var(--text3); }

    /* ── Modal base ─────────────────────────────── */
    .overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.75); z-index: 100;
      align-items: center; justify-content: center; padding: 20px;
    }
    .overlay.open { display: flex; }

    /* ── Read modal ─────────────────────────────── */
    .read-modal {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%; max-width: 660px; max-height: 88vh;
      overflow-y: auto; padding: 28px; position: relative;
    }

    .rm-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .rm-cat { font-size: 11px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; }
    .rm-date { font-size: 11px; color: var(--text3); margin-left: auto; margin-right: 36px; }
    .rm-title { font-size: 22px; font-weight: 700; line-height: 1.3; margin-bottom: 16px; }
    .rm-body {
      color: var(--text2); line-height: 1.75; font-size: 14px;
      white-space: pre-wrap; word-break: break-word;
    }
    .rm-body a { color: var(--accent); text-decoration: none; }
    .rm-body a:hover { text-decoration: underline; }
    .rm-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 20px; }
    .rm-actions {
      display: flex; gap: 8px; margin-top: 20px;
      padding-top: 16px; border-top: 1px solid var(--border);
    }

    .close-btn {
      position: absolute; top: 16px; right: 16px;
      background: var(--s3); border: none; color: var(--text2);
      width: 28px; height: 28px; border-radius: 7px;
      cursor: pointer; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .close-btn:hover { background: var(--border2); color: var(--text); }

    /* ── Form modal ─────────────────────────────── */
    .form-box {
      background: var(--s1);
      border: 1px solid var(--border2);
      border-radius: 16px;
      width: 100%; max-width: 580px; max-height: 92vh;
      overflow-y: auto; padding: 26px; position: relative;
    }
    .form-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; }
    .fg { margin-bottom: 13px; }
    .fl {
      display: block; font-size: 11px; font-weight: 700;
      letter-spacing: .07em; text-transform: uppercase;
      color: var(--text3); margin-bottom: 5px;
    }
    .fi, .fs, .fta {
      width: 100%; background: var(--s2);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; color: var(--text);
      font-size: 13.5px; font-family: inherit;
      outline: none; transition: border-color .2s;
    }
    .fi:focus, .fs:focus, .fta:focus { border-color: var(--accent); }
    .fta { min-height: 130px; resize: vertical; line-height: 1.6; }
    .fs option { background: var(--s2); }
    .frow { display: flex; align-items: center; gap: 8px; }
    .frow input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--accent); }
    .frow label { font-size: 13px; color: var(--text2); cursor: pointer; }
    .form-actions { display: flex; gap: 8px; margin-top: 18px; justify-content: flex-end; }

    /* ── Confirm modal ──────────────────────────── */
    .confirm-box {
      background: var(--s1); border: 1px solid var(--border2);
      border-radius: 14px; width: 100%; max-width: 340px;
      padding: 24px; text-align: center;
    }
    .confirm-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; }
    .confirm-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
    .confirm-actions { display: flex; gap: 8px; justify-content: center; }
    .btn-danger { background: #c0314f; color: #fff; }
    .btn-danger:hover { opacity: .88; }

    /* ── Toast ──────────────────────────────────── */
    .toast {
      position: fixed; bottom: 22px; right: 22px;
      background: var(--s2); border: 1px solid var(--border2);
      color: var(--text); padding: 11px 16px; border-radius: 10px;
      font-size: 13px; z-index: 999;
      box-shadow: 0 4px 20px rgba(0,0,0,.45);
      animation: fadeup .25s ease;
    }
    @keyframes fadeup {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scrollbar ──────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

    /* ── Responsive ─────────────────────────────── */
    @media (max-width: 600px) {
      .sidebar { display: none; }
      .content { padding: 16px; }
      .topbar { padding: 10px 16px; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="logo"><span class="logo-dot"></span>MyBook</div>

    <div class="sb-section">
      <div class="sb-label">Обзор</div>
      <button class="sb-btn active" data-cat="all" onclick="setCat('all',this)">
        <span class="icon">◈</span> Все записи
        <span class="sb-count" id="cnt-all">0</span>
      </button>
      <button class="sb-btn" data-cat="pinned" onclick="setCat('pinned',this)">
        <span class="icon">📌</span> Закреплённые
        <span class="sb-count" id="cnt-pinned">0</span>
      </button>
    </div>

    <div class="sb-divider"></div>

    <div class="sb-section">
      <div class="sb-label">Категории</div>
      <div id="sb-cats"></div>
    </div>

    <div class="sb-bottom">
      <button class="sb-btn" onclick="exportNotes()" title="Скачать резервную копию">
        <span class="icon">⬇</span> Экспорт
      </button>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13.5" y1="13.5" x2="18" y2="18"/>
        </svg>
        <input id="search" type="text" placeholder="Поиск…  [/]" oninput="render()" />
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary" onclick="openForm()">＋ Добавить</button>
      </div>
    </div>

    <div class="content">
      <div class="page-head">
        <div class="page-title" id="page-title">Все записи</div>
        <div class="page-count" id="page-count"></div>
      </div>
      <div id="grid" class="grid"></div>
      <div id="empty" class="empty" style="display:none">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">Ничего не найдено</div>
        <div class="empty-sub">Попробуй другой запрос или добавь новую запись</div>
      </div>
    </div>
  </div>
</div>

<!-- ── Read overlay ── -->
<div class="overlay" id="ov-read" onclick="closeOv('ov-read',event)">
  <div class="read-modal">
    <button class="close-btn" onclick="closeOv('ov-read')">✕</button>
    <div class="rm-top">
      <span class="rm-cat" id="rm-cat"></span>
      <span class="rm-date" id="rm-date"></span>
    </div>
    <div class="rm-title" id="rm-title"></div>
    <div class="rm-body"  id="rm-body"></div>
    <div class="rm-tags"  id="rm-tags"></div>
    <div class="rm-actions">
      <button class="btn btn-ghost" onclick="copyContent()">📋 Копировать</button>
      <button class="btn btn-ghost" id="rm-edit-btn">✏️ Изменить</button>
      <button class="btn btn-ghost" style="color:#e05577" id="rm-del-btn">🗑 Удалить</button>
    </div>
  </div>
</div>

<!-- ── Form overlay ── -->
<div class="overlay" id="ov-form" onclick="closeOv('ov-form',event)">
  <div class="form-box">
    <button class="close-btn" onclick="closeOv('ov-form')">✕</button>
    <div class="form-title" id="f-modal-title">Новая запись</div>

    <div class="fg">
      <label class="fl">Заголовок</label>
      <input class="fi" id="f-title" type="text" placeholder="Название записи…" />
    </div>
    <div class="fg">
      <label class="fl">Категория</label>
      <select class="fs" id="f-cat"></select>
    </div>
    <div class="fg">
      <label class="fl">Содержимое</label>
      <textarea class="fta" id="f-body" placeholder="Текст, ссылки, заметки…"></textarea>
    </div>
    <div class="fg">
      <label class="fl">Теги (через запятую)</label>
      <input class="fi" id="f-tags" type="text" placeholder="дизайн, клиент, важное…" />
    </div>
    <div class="fg frow">
      <input type="checkbox" id="f-pin" />
      <label for="f-pin">Закрепить</label>
    </div>

    <div class="form-actions">
      <button class="btn btn-ghost" onclick="closeOv('ov-form')">Отмена</button>
      <button class="btn btn-primary" onclick="submitForm()">Сохранить</button>
    </div>
  </div>
</div>

<!-- ── Confirm overlay ── -->
<div class="overlay" id="ov-confirm" onclick="closeOv('ov-confirm',event)">
  <div class="confirm-box">
    <div class="confirm-title">Удалить запись?</div>
    <div class="confirm-sub">Это действие нельзя отменить</div>
    <div class="confirm-actions">
      <button class="btn btn-ghost" onclick="closeOv('ov-confirm')">Отмена</button>
      <button class="btn btn-danger" id="confirm-ok">Удалить</button>
    </div>
  </div>
</div>

<script>
// ── Categories ───────────────────────────────────────────────
const CATS = [
  { id:'work',      label:'Работа',        icon:'💼', color:'#c9a96e' },
  { id:'clients',   label:'Клиенты',       icon:'🤝', color:'#9b7fe8' },
  { id:'templates', label:'Шаблоны',       icon:'📄', color:'#5eaee0' },
  { id:'ideas',     label:'Идеи',          icon:'💡', color:'#e07b50' },
  { id:'learn',     label:'Учёба / Инфо', icon:'📚', color:'#5bbf7a' },
  { id:'links',     label:'Ссылки',        icon:'🔗', color:'#e05577' },
  { id:'notes',     label:'Заметки',       icon:'🗒️', color:'#8e8ea0' },
  { id:'misc',      label:'Разное',        icon:'🗃️', color:'#55556a' },
];

// ── Default seed notes ───────────────────────────────────────
const SEED = [
  {
    id:1, cat:'notes', pin:true, tags:['старт'],
    created:'2025-01-01',
    title:'Добро пожаловать в MyBook!',
    body:`Это твоя личная база знаний ✨

Как пользоваться:
• Кнопка "＋ Добавить" — новая запись
• Кликни на карточку — читать полный текст
• Поиск вверху (или клавиша "/") — по заголовку, тексту и тегам
• Слева — фильтр по категориям
• Теги кликабельны — фильтрует по тегу

На карточке при наведении:
  ✏️ Изменить  🗑 Удалить

Всё сохраняется в браузере автоматически.`,
  },
  {
    id:2, cat:'templates', pin:false, tags:['клиент','шаблон'],
    created:'2025-01-01',
    title:'Шаблон ответа клиенту',
    body:`Привет! Спасибо за обращение 🙏

Я ознакомилась с твоей идеей. Чтобы рассчитать стоимость и время, мне нужно уточнить:

1. Размер и место на теле
2. Цвет или чёрно-белая?
3. Примеры референсов (если есть)
4. Примерная дата, когда хочешь записаться

Жду ответа, чтобы всё посчитать ✨`,
  },
  {
    id:3, cat:'ideas', pin:false, tags:['идея','коллаб'],
    created:'2025-01-01',
    title:'Идея: коллаб с фотографом',
    body:`Сделать совместную съёмку — готовые тату + атмосферные кадры.

Продвигать оба аккаунта.
Договориться на взаимовыгодной основе.

Найти фотографа в теме dark / minimal.`,
  },
];

// ── Storage ──────────────────────────────────────────────────
const KEY = 'mybook_v2';
let NOTES = [];

function load() {
  try {
    const s = localStorage.getItem(KEY);
    NOTES = s ? JSON.parse(s) : JSON.parse(JSON.stringify(SEED));
    if (!s) save();
  } catch { NOTES = JSON.parse(JSON.stringify(SEED)); save(); }
}
function save() { localStorage.setItem(KEY, JSON.stringify(NOTES)); }

// ── State ────────────────────────────────────────────────────
let activeCat = 'all';
let activeTag = null;
let editingId = null;
let readingId = null;

// ── Init ─────────────────────────────────────────────────────
function init() {
  load();
  buildSidebar();
  buildCatSelect();
  render();
}

function buildSidebar() {
  document.getElementById('sb-cats').innerHTML = CATS.map(c => `
    <button class="sb-btn" data-cat="${c.id}" onclick="setCat('${c.id}',this)">
      <span class="icon">${c.icon}</span> ${c.label}
      <span class="sb-count" id="cnt-${c.id}">0</span>
    </button>`).join('');
}

function buildCatSelect() {
  document.getElementById('f-cat').innerHTML =
    CATS.map(c => `<option value="${c.id}">${c.icon} ${c.label}</option>`).join('');
}

function updateCounts() {
  document.getElementById('cnt-all').textContent    = NOTES.length;
  document.getElementById('cnt-pinned').textContent = NOTES.filter(n=>n.pin).length;
  CATS.forEach(c => {
    const el = document.getElementById('cnt-'+c.id);
    if (el) el.textContent = NOTES.filter(n=>n.cat===c.id).length;
  });
}

// ── Filter + Render ──────────────────────────────────────────
function setCat(cat, btn) {
  activeCat = cat; activeTag = null;
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const c = CATS.find(x=>x.id===cat);
  document.getElementById('page-title').textContent =
    cat==='all'    ? 'Все записи'         :
    cat==='pinned' ? '📌 Закреплённые'   :
    (c ? c.icon+' '+c.label : 'Все записи');
  render();
}

function setTag(tag) {
  activeTag = tag; activeCat = 'all';
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('[data-cat="all"]').classList.add('active');
  document.getElementById('page-title').textContent = '# '+tag;
  render();
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = NOTES.slice();

  if (activeCat==='pinned') list = list.filter(n=>n.pin);
  else if (activeCat!=='all') list = list.filter(n=>n.cat===activeCat);

  if (activeTag) list = list.filter(n=>n.tags?.includes(activeTag));

  if (q) list = list.filter(n=>
    n.title.toLowerCase().includes(q) ||
    (n.body||'').toLowerCase().includes(q) ||
    n.tags?.some(t=>t.toLowerCase().includes(q))
  );

  list.sort((a,b)=>(b.pin?1:0)-(a.pin?1:0));

  updateCounts();

  const grid  = document.getElementById('grid');
  const empty = document.getElementById('empty');

  document.getElementById('page-count').textContent =
    list.length ? list.length+' '+plural(list.length,'запись','записи','записей') : '';

  if (!list.length) { grid.innerHTML=''; empty.style.display='flex'; return; }
  empty.style.display = 'none';

  grid.innerHTML = list.map(n => {
    const c = CATS.find(x=>x.id===n.cat)||{icon:'',label:'',color:'#555'};
    const tags = (n.tags||[]).map(t=>
      `<span class="tag" onclick="event.stopPropagation();setTag('${esc(t)}')">#${esc(t)}</span>`
    ).join('');
    const date = n.created ? fmtDate(n.created) : '';
    return `<div class="card" style="border-left-color:${c.color}" onclick="openRead(${n.id})">
      <div class="card-top">
        <span class="card-cat-label" style="color:${c.color}">${c.icon} ${c.label}</span>
        ${n.pin?'<span class="card-pin">📌</span>':''}
        <span class="card-date">${date}</span>
      </div>
      <div class="card-title">${esc(n.title)}</div>
      <div class="card-body">${esc(n.body||'')}</div>
      ${tags?`<div class="card-tags">${tags}</div>`:''}
      <div class="card-actions" onclick="event.stopPropagation()">
        <button class="card-btn" onclick="openForm(${n.id})">✏️ Изменить</button>
        <button class="card-btn del" onclick="confirmDelete(${n.id})">🗑 Удалить</button>
        ${n.pin
          ? `<button class="card-btn" onclick="togglePin(${n.id})">📌 Открепить</button>`
          : `<button class="card-btn" onclick="togglePin(${n.id})">📌 Закрепить</button>`}
      </div>
    </div>`;
  }).join('');
}

// ── Read modal ───────────────────────────────────────────────
function openRead(id) {
  const n = NOTES.find(x=>x.id===id);
  if (!n) return;
  readingId = id;
  const c = CATS.find(x=>x.id===n.cat)||{icon:'',label:'',color:'#555'};
  document.getElementById('rm-cat').textContent = c.icon+' '+c.label;
  document.getElementById('rm-cat').style.color = c.color;
  document.getElementById('rm-date').textContent = n.created ? fmtDate(n.created) : '';
  document.getElementById('rm-title').textContent = n.title;
  document.getElementById('rm-body').innerHTML = linkify(esc(n.body||''));
  document.getElementById('rm-tags').innerHTML = (n.tags||[])
    .map(t=>`<span class="tag" onclick="setTag('${esc(t)}');closeOv('ov-read')">#${esc(t)}</span>`).join('');
  document.getElementById('rm-edit-btn').onclick = ()=>{ closeOv('ov-read'); openForm(id); };
  document.getElementById('rm-del-btn').onclick  = ()=>{ closeOv('ov-read'); confirmDelete(id); };
  openOv('ov-read');
}

function copyContent() {
  const n = NOTES.find(x=>x.id===readingId);
  if (!n) return;
  navigator.clipboard?.writeText(n.body||'');
  toast('📋 Скопировано');
}

// ── Form modal ───────────────────────────────────────────────
function openForm(id) {
  editingId = id || null;
  document.getElementById('f-modal-title').textContent = id ? 'Изменить запись' : 'Новая запись';
  if (id) {
    const n = NOTES.find(x=>x.id===id);
    if (!n) return;
    document.getElementById('f-title').value = n.title;
    document.getElementById('f-cat').value   = n.cat;
    document.getElementById('f-body').value  = n.body||'';
    document.getElementById('f-tags').value  = (n.tags||[]).join(', ');
    document.getElementById('f-pin').checked = !!n.pin;
  } else {
    document.getElementById('f-title').value = '';
    document.getElementById('f-cat').value   = CATS[0].id;
    document.getElementById('f-body').value  = '';
    document.getElementById('f-tags').value  = '';
    document.getElementById('f-pin').checked = false;
  }
  openOv('ov-form');
  setTimeout(()=>document.getElementById('f-title').focus(), 80);
}

function submitForm() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); return; }
  const tags = document.getElementById('f-tags').value
    .split(',').map(t=>t.trim()).filter(Boolean);

  if (editingId) {
    const n = NOTES.find(x=>x.id===editingId);
    if (n) {
      n.title = title;
      n.cat   = document.getElementById('f-cat').value;
      n.body  = document.getElementById('f-body').value;
      n.tags  = tags;
      n.pin   = document.getElementById('f-pin').checked;
    }
    toast('✅ Изменено');
  } else {
    const maxId = NOTES.reduce((m,n)=>Math.max(m,n.id),0);
    NOTES.unshift({
      id: maxId+1,
      title,
      cat:  document.getElementById('f-cat').value,
      body: document.getElementById('f-body').value,
      tags,
      pin:  document.getElementById('f-pin').checked,
      created: new Date().toISOString().slice(0,10),
    });
    toast('✅ Сохранено');
  }
  save(); render(); closeOv('ov-form');
}

// ── Delete ───────────────────────────────────────────────────
function confirmDelete(id) {
  document.getElementById('confirm-ok').onclick = () => {
    NOTES = NOTES.filter(n=>n.id!==id);
    save(); render(); closeOv('ov-confirm');
    toast('🗑 Удалено');
  };
  openOv('ov-confirm');
}

// ── Pin ──────────────────────────────────────────────────────
function togglePin(id) {
  const n = NOTES.find(x=>x.id===id);
  if (n) { n.pin = !n.pin; save(); render(); toast(n.pin ? '📌 Закреплено' : 'Откреплено'); }
}

// ── Export ───────────────────────────────────────────────────
function exportNotes() {
  const blob = new Blob([JSON.stringify(NOTES, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mybook-backup-'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
}

// ── Overlay helpers ──────────────────────────────────────────
function openOv(id) { document.getElementById(id).classList.add('open'); }
function closeOv(id, e) {
  if (e && e.target !== document.getElementById(id)) return;
  document.getElementById(id).classList.remove('open');
}

// ── Toast ────────────────────────────────────────────────────
function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s';
    setTimeout(()=>t.remove(), 300); }, 2200);
}

// ── Utils ────────────────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function linkify(s) {
  return s.replace(/(https?:\/\/[^\s<]+)/g,'<a href="$1" target="_blank" rel="noopener">$1</a>');
}
function fmtDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('ru-RU',{day:'numeric',month:'short',year:'numeric'});
}
function plural(n, one, few, many) {
  const m = n%10, h = n%100;
  if (m===1&&h!==11) return one;
  if (m>=2&&m<=4&&(h<10||h>=20)) return few;
  return many;
}

// ── Keyboard ─────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key==='Escape') ['ov-read','ov-form','ov-confirm'].forEach(id=>{
    document.getElementById(id).classList.remove('open');
  });
  if (e.key==='/' && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement.tagName)) {
    e.preventDefault(); document.getElementById('search').focus();
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='k') {
    e.preventDefault(); document.getElementById('search').focus();
  }
});

init();
</script>
